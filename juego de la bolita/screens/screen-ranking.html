<!-- PANTALLA 6: RANKING -->
<section id="screen-ranking" class="screen hidden">
    <div class="ranking-title">🏆 RANKING GLOBAL</div>
    <div class="ranking-card panel">
        <div id="ranking-list"></div>
    </div>
    <div style="display:flex;gap:12px;">
        <button id="btn-back-ranking" class="btn btn-secondary">← Volver</button>
        <button id="btn-clear-ranking" class="btn btn-danger" style="font-size:11px;padding:10px 18px;">🗑 Borrar</button>
    </div>
</section>
